name: release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  # Avoids touching Cargo.toml's [profile.release] for this — cargo reads
  # profile keys from env too.
  CARGO_PROFILE_RELEASE_STRIP: symbols

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            bin_name: bro
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            bin_name: bro
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            bin_name: bro
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_name: bro.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          archive="bro-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" "${{ matrix.bin_name }}"
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $archive = "bro-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: bro-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Determine prerelease
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "flag=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          prerelease: ${{ steps.prerelease.outputs.flag }}
          fail_on_unmatched_files: true
